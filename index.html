<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOTTE MART - Data Entry Promo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group label i {
      margin-right: 8px;
      color: #667eea;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      background-color: #fafafa;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      background-color: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    select:disabled {
      background-color: #f0f0f0;
      cursor: not-allowed;
    }

    .row {
      display: flex;
      gap: 15px;
    }

    .row .form-group {
      flex: 1;
    }

    .division-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    .upload-area {
      border: 2px dashed #667eea;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    }

    .upload-area i {
      font-size: 40px;
      color: #667eea;
      margin-bottom: 10px;
    }

    .upload-area p {
      color: #666;
      font-size: 14px;
    }

    .upload-area.has-image {
      border-style: solid;
      border-color: #4CAF50;
    }

    .preview-container {
      margin-top: 15px;
      text-align: center;
    }

    .preview-container img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-submit i {
      margin-right: 10px;
    }

    .status-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status-message.success {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #155724;
      display: block;
    }

    .status-message.error {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
      color: #721c24;
      display: block;
    }

    .status-message.loading {
      background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
      color: #856404;
      display: block;
    }

    .store-type-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .store-type-tab {
      flex: 1;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .store-type-tab:hover {
      border-color: #667eea;
    }

    .store-type-tab.active {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .store-type-tab i {
      display: block;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .hidden {
      display: none !important;
    }

    .file-input {
      display: none;
    }

    .info-box {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #555;
    }

    .info-box i {
      color: #667eea;
      margin-right: 8px;
    }

    @media (max-width: 480px) {
      .row {
        flex-direction: column;
        gap: 0;
      }
      
      .card {
        padding: 20px;
      }
      
      .header h1 {
        font-size: 22px;
      }
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-store"></i> LOTTE MART</h1>
      <p>Data Entry Promo - Area Display</p>
    </div>

    <div class="card">
      <!-- Store Type Selection -->
      <div class="store-type-tabs">
        <div class="store-type-tab active" data-type="LSI" onclick="selectStoreType('LSI')">
          <i class="fas fa-warehouse"></i>
          LSI
        </div>
        <div class="store-type-tab" data-type="LMI" onclick="selectStoreType('LMI')">
          <i class="fas fa-shopping-bag"></i>
          LMI
        </div>
      </div>

      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        Pilih tipe toko dan lengkapi semua field untuk menambahkan data ke Google Slides.
      </div>

      <form id="dataEntryForm">
        <!-- Region Selection -->
        <div class="form-group">
          <label><i class="fas fa-map-marker-alt"></i> Region</label>
          <select id="region" required onchange="updateStores()">
            <option value="">-- Pilih Region --</option>
            <option value="Region 1">Region 1</option>
            <option value="Region 2">Region 2</option>
            <option value="Region 3">Region 3</option>
          </select>
        </div>

        <!-- Store Selection -->
        <div class="form-group">
          <label><i class="fas fa-store-alt"></i> Store Name</label>
          <select id="storeName" required disabled>
            <option value="">-- Pilih Store --</option>
          </select>
        </div>

        <!-- Division Selection -->
        <div class="form-group">
          <label><i class="fas fa-tags"></i> Division</label>
          <select id="division" required onchange="updateCategories()">
            <option value="">-- Pilih Division --</option>
            <option value="Dry Food">🟠 Dry Food</option>
            <option value="Fresh Food">🟢 Fresh Food</option>
            <option value="Meal Solution">🟤 Meal Solution</option>
            <option value="H&B HOME CARE">🔵 H&B HOME CARE</option>
            <option value="Non Food">🔷 Non Food</option>
          </select>
        </div>

        <!-- Category Selection -->
        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Category</label>
          <select id="category" required disabled>
            <option value="">-- Pilih Category --</option>
          </select>
        </div>

        <!-- Product Name -->
        <div class="form-group">
          <label><i class="fas fa-box"></i> Product Name</label>
          <input type="text" id="prodName" placeholder="Masukkan nama produk" required>
        </div>

        <!-- Stock -->
        <div class="form-group">
          <label><i class="fas fa-cubes"></i> Stock (STK)</label>
          <input type="text" id="stk" placeholder="Masukkan jumlah stock" required>
        </div>

        <!-- Image Upload -->
        <div class="form-group">
          <label><i class="fas fa-image"></i> Product Image</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Klik untuk upload gambar</p>
            <p style="font-size: 12px; color: #999;">JPG, PNG, atau GIF (Max 5MB)</p>
          </div>
          <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="handleImageUpload(event)">
          <div class="preview-container" id="previewContainer"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-submit" id="submitBtn">
          <i class="fas fa-paper-plane"></i> Submit Data
        </button>
      </form>

      <!-- Status Message -->
      <div class="status-message" id="statusMessage"></div>
    </div>
  </div>

  <script>
    let currentStoreType = 'LSI';
    let uploadedImageBase64 = '';

    // Initialize the form
    document.addEventListener('DOMContentLoaded', function() {
      selectStoreType('LSI');
    });

    // Store type selection
    function selectStoreType(type) {
      currentStoreType = type;
      
      // Update tabs
      document.querySelectorAll('.store-type-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`.store-type-tab[data-type="${type}"]`).classList.add('active');
      
      // Reset form selections
      document.getElementById('region').value = '';
      document.getElementById('storeName').innerHTML = '<option value="">-- Pilih Store --</option>';
      document.getElementById('storeName').disabled = true;
      
      // Clear status
      hideStatus();
    }

    // Update stores based on region and store type
    function updateStores() {
      const region = document.getElementById('region').value;
      const storeSelect = document.getElementById('storeName');
      
      storeSelect.innerHTML = '<option value="">-- Pilih Store --</option>';
      
      if (!region) {
        storeSelect.disabled = true;
        return;
      }
      
      const stores = getStores(currentStoreType, region);
      
      stores.forEach(store => {
        const option = document.createElement('option');
        option.value = formatStoreDisplay(store);
        option.textContent = formatStoreDisplay(store);
        storeSelect.appendChild(option);
      });
      
      storeSelect.disabled = false;
    }

    // Update categories based on division
    function updateCategories() {
      const division = document.getElementById('division').value;
      const categorySelect = document.getElementById('category');
      
      categorySelect.innerHTML = '<option value="">-- Pilih Category --</option>';
      
      if (!division) {
        categorySelect.disabled = true;
        return;
      }
      
      const categories = getCategories(division);
      
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = formatCategoryDisplay(cat);
        option.textContent = formatCategoryDisplay(cat);
        categorySelect.appendChild(option);
      });
      
      categorySelect.disabled = false;
    }

    // Handle image upload
    function handleImageUpload(event) {
      const file = event.target.files[0];
      const uploadArea = document.getElementById('uploadArea');
      const previewContainer = document.getElementById('previewContainer');
      
      if (!file) return;
      
      // Check file size (max 5MB)
      if (file.size > 5 * 1024 * 1024) {
        showStatus('Ukuran file terlalu besar. Maksimal 5MB.', 'error');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        uploadedImageBase64 = e.target.result;
        
        // Update upload area
        uploadArea.classList.add('has-image');
        uploadArea.innerHTML = `
          <i class="fas fa-check-circle" style="color: #4CAF50;"></i>
          <p style="color: #4CAF50;">Gambar berhasil diupload</p>
        `;
        
        // Show preview
        previewContainer.innerHTML = `<img src="${uploadedImageBase64}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    }

    // Form submission
    document.getElementById('dataEntryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!uploadedImageBase64) {
        showStatus('Silakan upload gambar produk terlebih dahulu.', 'error');
        return;
      }
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Mengirim...';
      
      showStatus('Sedang memproses data...', 'loading');
      
      const formData = {
        storeType: currentStoreType,
        region: document.getElementById('region').value,
        storeName: document.getElementById('storeName').value,
        division: document.getElementById('division').value,
        category: document.getElementById('category').value,
        prodName: document.getElementById('prodName').value,
        stk: document.getElementById('stk').value,
        image: uploadedImageBase64
      };
      
      try {
        const scriptUrl = getScriptUrl(currentStoreType);
        
        if (!scriptUrl || scriptUrl.includes('YOUR_')) {
          throw new Error('Script URL belum dikonfigurasi. Silakan update config.js');
        }
        
        const response = await fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData)
        });
        
        // Since we're using no-cors, we can't read the response
        // We'll assume success if no error is thrown
        showStatus('Data berhasil dikirim ke Google Slides!', 'success');
        
        // Reset form for next entry (keep region and store selected)
        document.getElementById('prodName').value = '';
        document.getElementById('stk').value = '';
        resetImageUpload();
        
      } catch (error) {
        showStatus('Error: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Data';
      }
    });

    // Reset image upload area
    function resetImageUpload() {
      uploadedImageBase64 = '';
      const uploadArea = document.getElementById('uploadArea');
      const previewContainer = document.getElementById('previewContainer');
      
      uploadArea.classList.remove('has-image');
      uploadArea.innerHTML = `
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Klik untuk upload gambar</p>
        <p style="font-size: 12px; color: #999;">JPG, PNG, atau GIF (Max 5MB)</p>
      `;
      previewContainer.innerHTML = '';
      document.getElementById('imageInput').value = '';
    }

    // Show status message
    function showStatus(message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = 'status-message ' + type;
    }

    // Hide status message
    function hideStatus() {
      document.getElementById('statusMessage').className = 'status-message';
    }
  </script>
</body>
</html>
